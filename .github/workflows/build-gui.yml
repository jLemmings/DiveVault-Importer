name: Build GUI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: divesync-windows
            artifact_path: dist/DiveSync.exe
            python_cmd: python
          - os: ubuntu-latest
            artifact_name: divesync-linux
            artifact_path: dist/DiveSync
            python_cmd: python
          - os: macos-latest
            artifact_name: divesync-macos
            artifact_path: dist/DiveSync.app
            python_cmd: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          ${{ matrix.python_cmd }} -m pip install --upgrade pip
          ${{ matrix.python_cmd }} -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build GUI executable
        run: ${{ matrix.python_cmd }} scripts/build_gui.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    if: github.event_name != 'pull_request'
    needs: build-gui
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Determine release version
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          base_version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$base_version" ]; then
            echo "VERSION file is empty." >&2
            exit 1
          fi

          short_sha="$(git rev-parse --short=7 "$GITHUB_SHA")"
          release_version="$base_version"
          prerelease_flag="false"

          if gh release view "$base_version" >/dev/null 2>&1; then
            release_version="${base_version}-${short_sha}"
            prerelease_flag="true"
          fi

          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=$prerelease_flag" >> "$GITHUB_ENV"

      - name: Prepare release assets
        run: |
          mkdir -p release-upload

          if [ -f release-assets/divesync-windows/DiveSync.exe ]; then
            cp release-assets/divesync-windows/DiveSync.exe "release-upload/DiveSync-windows-${RELEASE_VERSION}.exe"
          fi

          if [ -f release-assets/divesync-linux/DiveSync ]; then
            cp release-assets/divesync-linux/DiveSync "release-upload/DiveSync-linux-${RELEASE_VERSION}"
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find release-upload -maxdepth 1 -type f)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release-upload assets were prepared." >&2
            exit 1
          fi

          release_args=(
            "$RELEASE_VERSION"
            "${assets[@]}"
            --title "DiveVault Importer $RELEASE_VERSION"
            --notes "Automated GUI build for commit ${{ github.sha }}"
            --latest=false
          )

          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"
