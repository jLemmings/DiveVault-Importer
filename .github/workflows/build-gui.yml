name: Build GUI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-gui:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: divesync-windows
            artifact_path: dist/DiveSync.exe
            python_cmd: python
            use_setup_python: true
          # - os: ubuntu-latest
          #   artifact_name: divesync-linux
          #   artifact_path: dist/DiveSync
          #   python_cmd: python3
          #   use_setup_python: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.use_setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # - name: Install Linux system dependencies
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libdivecomputer0 python3-pip python3-tk

      - name: Install Python dependencies
        run: |
          ${{ matrix.python_cmd }} -m pip install --upgrade pip
          ${{ matrix.python_cmd }} -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build GUI executable
        run: ${{ matrix.python_cmd }} scripts/build_gui.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
