name: Build GUI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: divesync-windows
            artifact_path: dist/divesync-windows.zip
            python_cmd: python
          - os: ubuntu-latest
            artifact_name: divesync-linux
            artifact_path: dist/divesync-linux.tar.gz
            python_cmd: python
          - os: macos-latest
            artifact_name: divesync-macos
            artifact_path: dist/divesync-macos.zip
            python_cmd: python

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: matrix.use_setup_python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          ${{ matrix.python_cmd }} -m pip install --upgrade pip
          ${{ matrix.python_cmd }} -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build GUI executable
        run: ${{ matrix.python_cmd }} scripts/build_gui.py

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -LiteralPath dist\DiveSync.exe -DestinationPath dist\divesync-windows.zip -Force

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: tar -C dist -czf dist/divesync-linux.tar.gz DiveSync

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/DiveSync.app dist/divesync-macos.zip

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    if: github.event_name != 'pull_request'
    needs: build-gui
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: gui-build-${{ github.run_number }}
          RELEASE_TITLE: GUI Build ${{ github.run_number }}
        run: |
          mapfile -t assets < <(find release-assets -type f)
          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated GUI build for commit ${{ github.sha }}" \
            --latest=false \
            --prerelease
