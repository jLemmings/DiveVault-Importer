name: Build GUI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: divesync-windows
            artifact_path: dist/DiveSync.exe
            python_cmd: python
            use_setup_python: true
          # - os: ubuntu-latest
          #   artifact_name: divesync-linux
          #   artifact_path: dist/DiveSync
          #   python_cmd: python3
          #   use_setup_python: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: matrix.use_setup_python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      # - name: Install Linux system dependencies
      #   if: runner.os == 'Linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y libdivecomputer0 python3-pip python3-tk

      - name: Install Python dependencies
        run: |
          ${{ matrix.python_cmd }} -m pip install --upgrade pip
          ${{ matrix.python_cmd }} -m pip install -r requirements.txt -r requirements-build.txt

      - name: Build GUI executable
        run: ${{ matrix.python_cmd }} scripts/build_gui.py

      - name: Upload executable artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    if: github.event_name != 'pull_request'
    needs: build-gui
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: gui-build-${{ github.run_number }}
          RELEASE_TITLE: GUI Build ${{ github.run_number }}
        run: |
          mapfile -t assets < <(find release-assets -type f)
          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --title "$RELEASE_TITLE" \
            --notes "Automated GUI build for commit ${{ github.sha }}" \
            --latest=false \
            --prerelease
